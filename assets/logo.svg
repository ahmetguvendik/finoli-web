<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c7d2fe"/>
      <stop offset="1" stop-color="#a5b4fc"/>
    </linearGradient>
  </defs>

  <!-- Arka plan kart -->
  <rect x="0" y="0" width="400" height="400" rx="96" fill="url(#bg)"/>
  <rect x="2" y="2" width="396" height="396" rx="95" fill="none" stroke="#6366f1" stroke-width="3" stroke-opacity="0.3"/>

  <!-- F harfi (bar chart) -->
  <rect x="100" y="105" width="52" height="190" rx="16" fill="url(#bar1)"/>
  <rect x="100" y="105" width="175" height="52" rx="16" fill="url(#bar3)"/>
  <rect x="100" y="191" width="130" height="46" rx="16" fill="url(#bar2)"/>

  <!-- Aksan nokta -->
  <circle cx="310" cy="118" r="18" fill="#c7d2fe" opacity="0.15"/>
  <circle cx="310" cy="118" r="9" fill="#c7d2fe" opacity="0.6"/>
</svg>
